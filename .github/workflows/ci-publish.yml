name: CI & Publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Lint
        run: bun run lint

  publish:
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write # required for npm Trusted Publishing (OIDC)
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false # never use caching in release builds

      - name: Install dependencies
        run: bun install

      - name: Build all packages
        run: bun run build

      - name: Enforce lockstep versions
        run: bun scripts/check-lockstep.ts

      - name: Publish packages (in dependency order)
        # Packages are published one-by-one in dependency order because bun
        # workspaces resolve workspace:* references locally and npm requires
        # each dependency to already exist on the registry before dependents.
        run: |
          for pkg in core rdf export-apple export-dict dbnary wordnet; do
            (cd packages/$pkg && bun publish --access public)
          done
